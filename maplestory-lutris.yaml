name: MapleStory
slug: maplestory-linux-proton-patch
version: Steam Proton patch bundle
runner: steam
game_slug: maplestory
require-binaries: bash, git, python3, steam

script:
  game:
    appid: 216150

  installer:
    - input_menu:
        description: "Choose the Wine virtual desktop size. Pick the monitor resolution you play MapleStory on."
        id: DESKTOP_SIZE
        options:
          - "3840x2160": "3840x2160 / 4K"
          - "2560x1440": "2560x1440 / 1440p"
          - "1920x1080": "1920x1080 / 1080p"
        preselect: "3840x2160"
    - execute:
        disable_runtime: true
        working_dir: $CACHE
        command: |
          set -eu
          repo="$CACHE/linux_maplestory"
          if [ -d "$repo/.git" ]; then
            git -C "$repo" fetch --depth=1 origin main
            git -C "$repo" reset --hard origin/main
          else
            rm -rf "$repo"
            git clone --depth=1 https://github.com/oldschoola/linux_maplestory.git "$repo"
          fi
          chmod +x "$repo/install.sh" "$repo/patches/13-apply-runtime-file-patches.sh" "$repo/patches/make-virtual-desktop-patch.sh"
          "$repo/install.sh" --kill --desktop-size "$INPUT_DESKTOP_SIZE"

install_complete_text: |
  Lutris installed the Steam MapleStory entry and ran the linux_maplestory Proton patch bundle.

  Launch MapleStory through this Lutris entry or through Steam. Do not run MapleStory.exe directly; Steam provides the Nexon launch ticket through nxsteam.exe.

  This is still WIP. Nexon/BlackCipher anti-cheat may reject or break this setup after updates.
