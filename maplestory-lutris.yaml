name: MapleStory
slug: maplestory-linux-proton-patch
version: Steam Proton patch bundle
runner: steam
game_slug: maplestory
require-binaries: bash, git, steam

script:
  game:
    appid: 216150

  installer:
    - input_menu:
        description: "Enable the Wine virtual desktop? Off by default — only needed for the BadWindow/X_CreateWindow launch crash or alt-tab input loss under XWayland. Pick a size to enable it."
        id: DESKTOP_SIZE
        options:
          - "disabled": "No virtual desktop (default)"
          - "1920x1080": "1920x1080 / 1080p"
          - "2560x1440": "2560x1440 / 1440p"
          - "3840x2160": "3840x2160 / 4K"
        preselect: "disabled"
    - execute:
        disable_runtime: true
        working_dir: $CACHE
        command: |
          set -eu
          repo="$CACHE/linux_maplestory"
          if [ -d "$repo/.git" ]; then
            git -C "$repo" fetch --depth=1 origin main
            git -C "$repo" reset --hard origin/main
          else
            rm -rf "$repo"
            git clone --depth=1 https://github.com/oldschoola/linux_maplestory.git "$repo"
          fi
          chmod +x "$repo/install.sh" "$repo/patches/13-apply-runtime-file-patches.sh" "$repo/patches/make-virtual-desktop-patch.sh" "$repo/patches/20-hid-apple-fkeysfirst.sh"
          if [ "$INPUT_DESKTOP_SIZE" = "disabled" ]; then
            "$repo/install.sh" --kill
          else
            "$repo/install.sh" --kill --virtual-desktop --desktop-size "$INPUT_DESKTOP_SIZE"
          fi

install_complete_text: |
  Lutris installed the Steam MapleStory entry and ran the linux_maplestory Proton patch bundle.

  Launch MapleStory through this Lutris entry or through Steam. Do not run MapleStory.exe directly; Steam provides the Nexon launch ticket through nxsteam.exe.

  If plain F1-F12 do not reach the game on an Apple-compatible keyboard, run patches/20-hid-apple-fkeysfirst.sh manually from a terminal in the cloned linux_maplestory repo, or rerun install.sh with --fix-fkeys. Lutris does not apply this automatically because the system-wide keyboard setting requires sudo.

  This is still WIP. Nexon/BlackCipher anti-cheat may reject or break this setup after updates.
